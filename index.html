<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Negra Tomasa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --green: #3B6D11; --red: #A32D2D;
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333331;
      --text: #f0ede8; --text2: #a8a8a2; --text3: #6e6e6a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --green: #97C459; --red: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 920px; margin: 0 auto; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .date-nav { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 6px 10px; }
  .date-nav button { background: none; border: none; cursor: pointer; color: var(--text); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .date-nav button:hover { background: var(--bg2); }
  #date-label { font-size: 14px; font-weight: 500; min-width: 200px; text-align: center; }
  .btn-today { background: none; border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); font-size: 12px; padding: 4px 10px; border-radius: var(--radius-md); }
  .btn-today:hover { background: var(--bg2); }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 1.5rem 0 10px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .kpi { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
  .kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .kpi-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .kpi-delta { font-size: 12px; margin-top: 4px; }
  .kpi-delta.up { color: var(--green); }
  .kpi-delta.down { color: var(--red); }
  .kpi-prev { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 10px; }
  @media (max-width: 600px) { .charts-row { grid-template-columns: 1fr; } }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .card h3 { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; font-size: 11px; color: var(--text2); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--text2); font-size: 14px; padding: 2rem 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #fff0f0; border: 0.5px solid #f09595; border-radius: var(--radius-md); padding: 1rem; font-size: 13px; color: #a32d2d; }
  .no-data { color: var(--text3); font-size: 13px; padding: 0.5rem 0; }
  .sync-bar { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: var(--text2); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #3B6D11; display: inline-block; margin-right: 6px; }
  .btn-refresh { background: none; border: 0.5px solid var(--border2); cursor: pointer; color: var(--text2); font-size: 11px; padding: 3px 10px; border-radius: var(--radius-md); }
  .btn-refresh:hover { background: var(--bg2); }
  .footer { text-align: center; font-size: 11px; color: var(--text3); margin-top: 2rem; }

  /* Modal entrada de datos */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 380px; border: 0.5px solid var(--border2); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .form-row input { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: var(--bg2); color: var(--text); font-size: 14px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
  .btn-save { flex: 1; padding: 9px; background: #1a1a18; color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-save:hover { opacity: 0.85; }
  .btn-cancel { flex: 1; padding: 9px; background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-md); cursor: pointer; font-size: 14px; color: var(--text2); }
  .btn-add { background: #1a1a18; color: #fff; border: none; border-radius: var(--radius-md); padding: 7px 14px; font-size: 12px; cursor: pointer; }
  .btn-add:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>Negra Tomasa · Dashboard</h1>
      <p>Conectado a Notion · Se actualiza automáticamente</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
      <div class="date-nav">
        <button onclick="changeDay(-1)">←</button>
        <div id="date-label">–</div>
        <button onclick="changeDay(1)">→</button>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn-today" onclick="goToday()">← Hoy</button>
        <button class="btn-add" onclick="openModal()">+ Añadir día</button>
      </div>
    </div>
  </div>

  <!-- SYNC BAR -->
  <div class="sync-bar">
    <span><span class="sync-dot"></span><span id="sync-status">Cargando datos desde Notion...</span></span>
    <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <div id="main-content">
    <div class="loading"><div class="spinner"></div> Conectando con Notion...</div>
  </div>

</div>

<!-- MODAL AÑADIR DÍA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Añadir registro diario</h2>
    <div class="form-row"><label>Fecha</label><input type="date" id="f-fecha"></div>
    <div class="form-row"><label>Comidas</label><input type="number" id="f-comidas" min="0" placeholder="0"></div>
    <div class="form-row"><label>Cenas</label><input type="number" id="f-cenas" min="0" placeholder="0"></div>
    <div class="form-row"><label>Última llamada</label><input type="text" id="f-llamada" placeholder="22:30"></div>
    <div id="modal-error" style="font-size:12px;color:var(--red);min-height:16px;margin-top:4px;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveRecord()">Guardar en Notion</button>
    </div>
  </div>
</div>

let DATA = { ...HISTORICAL };
let selDate = new Date();
let lastSync = null;

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDate(d) { return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function changeDay(n) { selDate = new Date(selDate); selDate.setDate(selDate.getDate()+n); renderDashboard(); }
function goToday() { selDate = new Date(); renderDashboard(); }

async function loadData() {
  document.getElementById('sync-status').textContent = 'Sincronizando con Notion...';
  try {
    const res = await fetch(WORKER_URL + '/data');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    rows.forEach(r => {
      if (r.fecha) DATA[r.fecha] = { comidas: r.comidas || 0, cenas: r.cenas || 0, llamada: r.llamada };
    });
    lastSync = new Date();
    document.getElementById('sync-status').textContent = `Datos actualizados · ${lastSync.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('sync-status').textContent = 'Sin conexión con Notion · Mostrando datos locales';
  }
  renderDashboard();
}

function delta(curr, prev) {
  if (prev == null || prev === 0) return null;
  return Math.round(((curr-prev)/prev)*100);
}
function deltaHtml(pct, prev) {
  if (pct == null) return `<div class="kpi-prev">Sin dato anterior</div>`;
  const cls = pct >= 0 ? 'up' : 'down', arrow = pct >= 0 ? '↑' : '↓';
  return `<div class="kpi-delta ${cls}">${arrow} ${pct>=0?'+':''}${pct}% vs sem. ant.</div><div class="kpi-prev">Semana anterior: ${prev ?? '–'}</div>`;
}

let charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

const baseOpts = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { grid: { display: false }, ticks: { font: { size: 10 }, maxRotation: 45, autoSkip: false } },
    y: { beginAtZero: true, ticks: { font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.12)' } }
  }
};

function buildDayKPIs() {
  const key = dateKey(selDate);
  const prev7 = new Date(selDate); prev7.setDate(prev7.getDate()-7);
  const d = DATA[key], pd = DATA[dateKey(prev7)];
  const el = document.getElementById('kpi-day');
  if (!d) { el.innerHTML = `<div class="no-data">Sin datos para este día.</div>`; return; }
  const tot = d.comidas+d.cenas, ptot = (pd?.comidas??0)+(pd?.cenas??0);
  el.innerHTML = `
    <div class="kpi"><div class="kpi-label">Comidas</div><div class="kpi-value">${d.comidas}</div>${deltaHtml(delta(d.comidas,pd?.comidas),pd?.comidas)}</div>
    <div class="kpi"><div class="kpi-label">Cenas</div><div class="kpi-value">${d.cenas}</div>${deltaHtml(delta(d.cenas,pd?.cenas),pd?.cenas)}</div>
    <div class="kpi"><div class="kpi-label">Total pax</div><div class="kpi-value">${tot}</div>${deltaHtml(delta(tot,ptot),ptot)}</div>
    <div class="kpi"><div class="kpi-label">Última llamada</div><div class="kpi-value" style="font-size:22px;">${d.llamada||'–'}</div><div class="kpi-prev">Sem. ant.: ${pd?.llamada||'–'}</div></div>
  `;
}

function getRange(from, days) {
  const labels=[],comidas=[],cenas=[];
  for(let i=0;i<days;i++){
    const d=new Date(from); d.setDate(d.getDate()+i);
    const k=dateKey(d);
    labels.push(d.toLocaleDateString('es-ES',{day:'numeric',month:'short'}));
    comidas.push(DATA[k]?.comidas??null);
    cenas.push(DATA[k]?.cenas??null);
  }
  return {labels,comidas,cenas};
}

function buildWeekCharts() {
  const w1s=new Date(selDate); w1s.setDate(w1s.getDate()-6);
  const w2s=new Date(w1s); w2s.setDate(w2s.getDate()-7);
  const w1=getRange(w1s,7), w2=getRange(w2s,7);
  ['weekComidas','weekCenas'].forEach(id => destroyChart(id));
  charts.weekComidas = new Chart(document.getElementById('weekComidas'),{type:'bar',data:{labels:w1.labels,datasets:[{data:w1.comidas,backgroundColor:'#378ADD',borderRadius:3,spanGaps:true},{data:w2.comidas,backgroundColor:'#B5D4F4',borderRadius:3,spanGaps:true}]},options:baseOpts});
  charts.weekCenas   = new Chart(document.getElementById('weekCenas'),  {type:'bar',data:{labels:w1.labels,datasets:[{data:w1.cenas,  backgroundColor:'#1D9E75',borderRadius:3,spanGaps:true},{data:w2.cenas,  backgroundColor:'#9FE1CB',borderRadius:3,spanGaps:true}]},options:baseOpts});
}

function buildMonthCharts() {
  const yr=selDate.getFullYear(), mo=selDate.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();
  const labels=Array.from({length:dim},(_,i)=>i+1);
  const tC=[],tCe=[],pC=[],pCe=[];
  for(let d=1;d<=dim;d++){
    const pad=String(d).padStart(2,'0'),mp=String(mo+1).padStart(2,'0');
    tC.push(DATA[`${yr}-${mp}-${pad}`]?.comidas??null);
    tCe.push(DATA[`${yr}-${mp}-${pad}`]?.cenas??null);
    pC.push(DATA[`${yr-1}-${mp}-${pad}`]?.comidas??null);
    pCe.push(DATA[`${yr-1}-${mp}-${pad}`]?.cenas??null);
  }
  const s=arr=>arr.reduce((a,v)=>a+(v??0),0);
  const stC=s(tC),stCe=s(tCe),spC=s(pC),spCe=s(pCe);
  const mn=selDate.toLocaleDateString('es-ES',{month:'long'});
  document.getElementById('kpi-month').innerHTML=`
    <div class="kpi"><div class="kpi-label">Comidas ${mn} ${yr}</div><div class="kpi-value">${stC.toLocaleString()}</div>${deltaHtml(delta(stC,spC),spC)}</div>
    <div class="kpi"><div class="kpi-label">Cenas ${mn} ${yr}</div><div class="kpi-value">${stCe.toLocaleString()}</div>${deltaHtml(delta(stCe,spCe),spCe)}</div>
    <div class="kpi"><div class="kpi-label">Total pax ${mn} ${yr}</div><div class="kpi-value">${(stC+stCe).toLocaleString()}</div>${deltaHtml(delta(stC+stCe,spC+spCe),spC+spCe)}</div>
    <div class="kpi"><div class="kpi-label">Días con datos</div><div class="kpi-value">${tC.filter(v=>v!==null).length}</div><div class="kpi-prev">Año ant.: ${pC.filter(v=>v!==null).length} días</div></div>
  `;
  const lo={responsive:true,maintainAspectRatio:false,elements:{point:{radius:2}},plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10}},y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'}}}};
  ['monthComidas','monthCenas'].forEach(id=>destroyChart(id));
  charts.monthComidas=new Chart(document.getElementById('monthComidas'),{type:'line',data:{labels,datasets:[{data:tC,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.1)',fill:true,tension:0.3,spanGaps:true},{data:pC,borderColor:'#B5D4F4',tension:0.3,spanGaps:true,borderDash:[4,3]}]},options:lo});
  charts.monthCenas  =new Chart(document.getElementById('monthCenas'),  {type:'line',data:{labels,datasets:[{data:tCe,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.1)',fill:true,tension:0.3,spanGaps:true},{data:pCe,borderColor:'#9FE1CB',tension:0.3,spanGaps:true,borderDash:[4,3]}]},options:lo});
}

function buildYearTrend() {
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const t26=[],t25=[];
  for(let m=0;m<12;m++){
    let s26=0,c26=0,s25=0,c25=0;
    const dim=new Date(new Date().getFullYear(),m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const pad=String(d).padStart(2,'0'),mp=String(m+1).padStart(2,'0');
      const k26=`2026-${mp}-${pad}`,k25=`2025-${mp}-${pad}`;
      if(DATA[k26]){s26+=DATA[k26].comidas+DATA[k26].cenas;c26++;}
      if(DATA[k25]){s25+=DATA[k25].comidas+DATA[k25].cenas;c25++;}
    }
    t26.push(c26?Math.round(s26/c26):null);
    t25.push(c25?Math.round(s25/c25):null);
  }
  destroyChart('yearTrend');
  charts.yearTrend=new Chart(document.getElementById('yearTrend'),{type:'line',data:{labels:months,datasets:[{label:'2026',data:t26,borderColor:'#7F77DD',backgroundColor:'rgba(127,119,221,0.12)',fill:true,tension:0.4,spanGaps:true,pointRadius:4},{label:'2025',data:t25,borderColor:'#AFA9EC',tension:0.4,spanGaps:true,borderDash:[5,4],pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{beginAtZero:true,ticks:{font:{size:11}},grid:{color:'rgba(128,128,128,0.12)'}}}}});
}

// Modal
function openModal() {
  const today = new Date();
  document.getElementById('f-fecha').value = dateKey(today);
  document.getElementById('f-comidas').value = '';
  document.getElementById('f-cenas').value = '';
  document.getElementById('f-llamada').value = '';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveRecord() {
  const fecha   = document.getElementById('f-fecha').value;
  const comidas = parseInt(document.getElementById('f-comidas').value) || 0;
  const cenas   = parseInt(document.getElementById('f-cenas').value)   || 0;
  const llamada = document.getElementById('f-llamada').value.trim();
  if (!fecha) { document.getElementById('modal-error').textContent = 'La fecha es obligatoria.'; return; }
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Guardando...'; btn.disabled = true;
  try {
    const res = await fetch(WORKER_URL + '/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fecha, comidas, cenas, llamada })
    });
    if (!res.ok) throw new Error();
    DATA[fecha] = { comidas, cenas, llamada: llamada || null };
    closeModal();
    renderDashboard();
    document.getElementById('sync-status').textContent = `Guardado en Notion · ${new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('modal-error').textContent = 'Error al guardar. Comprueba la conexión.';
  }
  btn.textContent = 'Guardar en Notion'; btn.disabled = false;
}

// Auto-refresh cada 5 minutos
setInterval(loadData, 5 * 60 * 1000);

// Arranque
loadData();
</script>
